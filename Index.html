<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice - Google Drive Integration</title>
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        h1 { color: #1a73e8; margin-bottom: 10px; font-size: 24px; }
        p { color: #5f6368; margin-bottom: 25px; font-size: 14px; }
        #user-info { margin-top: 20px; display: none; padding: 15px; background: #e8f0fe; border-radius: 8px; }
        .profile-pic { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 10px; border: 2px solid #1a73e8; }
        .success-msg { color: #0d904f; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>AI Voice Project</h1>
    <p>Google Drive API ke saath Sign-up karne ke liye niche button par click karein.</p>

    <!-- Google Sign-In Button Container -->
    <div id="g_id_onload"
         data-client_id="703305381743-cdq96p7rogoekgq1cbteu7nk4eh3ihcv.apps.googleusercontent.com"
         data-context="signup"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-shape="pill"
         data-theme="filled_blue"
         data-text="signup_with"
         data-size="large"
         data-logo_alignment="left">
    </div>

    <!-- Success Display -->
    <div id="user-info">
        <div class="success-msg">✅ 100% Signup Successful!</div>
        <img id="user-img" src="" alt="Profile" class="profile-pic">
        <h3 id="user-name"></h3>
        <p id="user-email"></p>
    </div>
</div>

<script>
    // Token ko decode karne ka function
    function parseJwt(token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }

    // Google Response Handle karne ka function
    function handleCredentialResponse(response) {
        if (response.credential) {
            const userData = parseJwt(response.credential);
            
            // UI update karna
            document.querySelector('.g_id_signin').style.display = 'none';
            document.querySelector('p').style.display = 'none';
            const infoDiv = document.getElementById('user-info');
            infoDiv.style.display = 'block';
            
            document.getElementById('user-img').src = userData.picture;
            document.getElementById('user-name').innerText = userData.name;
            document.getElementById('user-email').innerText = userData.email;

            console.log("Signup Success for: " + userData.name);
            // Drive API access ke liye yahan se token process karein
        }
    }
</script>

</body>
</html>
