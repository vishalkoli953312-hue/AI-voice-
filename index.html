<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Fire Ultra-Realistic AI</title>
    <style>
        :root { --glow: #00f2fe; --primary: #e94560; --dark: #0f0f1b; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .dashboard { background: rgba(22, 33, 62, 0.95); padding: 25px; border-radius: 20px; border: 2px solid var(--primary); box-shadow: 0 0 25px rgba(233, 69, 96, 0.3); width: 90%; max-width: 400px; text-align: center; }
        
        /* Visualizer Animation */
        .visualizer { display: flex; justify-content: center; align-items: flex-end; height: 40px; gap: 4px; margin-bottom: 20px; }
        .bar { width: 6px; background: var(--glow); border-radius: 3px; height: 8px; }
        .speaking .bar { animation: bounce 0.6s ease-in-out infinite alternate; }
        @keyframes bounce { from { height: 8px; } to { height: 40px; } }

        textarea { width: 100%; background: #1a1a2e; color: #fff; border: 1px solid #30475e; border-radius: 12px; padding: 12px; font-size: 15px; margin-bottom: 15px; outline: none; box-sizing: border-box; resize: none; }
        
        .control-panel { text-align: left; background: #16213e; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .row { margin-bottom: 12px; }
        label { font-size: 11px; color: #888; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; }

        .btn-main { background: linear-gradient(45deg, var(--primary), #950740); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>

<div class="dashboard">
    <h2 style="margin: 0 0 10px 0; letter-spacing: 1px;">SQUAD FIRE <span style="color: var(--glow);">AI</span></h2>
    
    <div class="visualizer" id="viz">
        <div class="bar" style="animation-delay: 0s"></div>
        <div class="bar" style="animation-delay: 0.1s"></div>
        <div class="bar" style="animation-delay: 0.2s"></div>
        <div class="bar" style="animation-delay: 0.3s"></div>
        <div class="bar" style="animation-delay: 0.4s"></div>
        <div class="bar" style="animation-delay: 0.5s"></div>
    </div>

    <textarea id="textInput" rows="3">नमस्ते प्लेयर! स्क्वाड फायर में आपका स्वागत है।</textarea>

    <div class="control-panel">
        <div class="row">
            <label>स्पीड (Speed): <span id="rVal">0.9</span></label>
            <input type="range" id="rate" min="0.5" max="1.5" value="0.9" step="0.1">
        </div>
        <div class="row">
            <label>पिच (Pitch): <span id="pVal">1.0</span></label>
            <input type="range" id="pitch" min="0.5" max="1.5" value="1.0" step="0.1">
        </div>
    </div>

    <button class="btn-main" onclick="speakNow()">आवाज़ सुनाएं</button>
</div>

<script>
    const synth = window.speechSynthesis;
    const viz = document.getElementById('viz');
    let voices = [];

    // आवाज़ों को लोड करने का सही तरीका
    function loadVoices() {
        voices = synth.getVoices();
    }
    
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    // स्लाइडर अपडेट
    document.getElementById('rate').oninput = (e) => document.getElementById('rVal').innerText = e.target.value;
    document.getElementById('pitch').oninput = (e) => document.getElementById('pVal').innerText = e.target.value;

    function speakNow() {
        if (synth.speaking) { synth.cancel(); } // अगर पहले से बोल रहा है तो रोकें

        const text = document.getElementById('textInput').value;
        if (!text) return;

        const utterance = new SpeechSynthesisUtterance(text);
        
        // हिंदी आवाज़ ढूँढें
        loadVoices(); 
        let hindiVoice = voices.find(v => v.lang.includes('hi-IN') && v.name.includes('Google')) || 
                         voices.find(v => v.lang.includes('hi-IN'));

        if (hindiVoice) {
            utterance.voice = hindiVoice;
        }

        utterance.rate = document.getElementById('rate').value;
        utterance.pitch = document.getElementById('pitch').value;
        utterance.volume = 1;

        // Visualizer Effect
        utterance.onstart = () => viz.classList.add('speaking');
        utterance.onend = () => viz.classList.remove('speaking');
        utterance.onerror = () => viz.classList.remove('speaking');

        synth.speak(utterance);
    }

    // शुरू में आवाज़ें लोड करें
    loadVoices();
</script>

</body>
</html>
