<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .voice-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: 'Segoe UI', sans-serif;
            max-width: 400px;
            margin: 20px auto;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            resize: none;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin: 15px 0 5px;
            font-size: 14px;
            font-weight: bold;
        }
        input[type=range] {
            width: 100%;
            accent-color: #007bff;
        }
        .btn-speak {
            width: 100%;
            padding: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
        .btn-speak:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="voice-card">
    <h3 style="text-align:center;">🔊 Voice Controller</h3>
    
    <textarea id="myText" placeholder="Yahan wo likhein jo aap sunna chahte hain..."></textarea>
    
    <!-- Male/Female Controller -->
    <div class="slider-label">
        <span>Awaaz (Male <-> Female)</span>
        <span id="pVal">1.0</span>
    </div>
    <input type="range" id="pitch" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('pVal').innerText=this.value">
    
    <!-- Speed Controller -->
    <div class="slider-label">
        <span>Raftaar (Speed)</span>
        <span id="sVal">1.0</span>
    </div>
    <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('sVal').innerText=this.value">

    <button class="btn-speak" onclick="startSpeaking()">AB SUNAYI DEGA</button>
</div>

<script>
function startSpeaking() {
    var txt = document.getElementById("myText").value;
    var p = document.getElementById("pitch").value;
    var s = document.getElementById("speed").value;

    if (txt.trim() === "") {
        alert("Pehle kuch likhiye!");
        return;
    }

    // Yeh Command AppAPI ke zariye App ko jayegi
    if (window.AppAPI) {
        // Humne data ko ek sath bhejne ke liye comma ka use kiya hai
        // Format: "text|pitch|speed"
        var finalData = txt + "|" + p + "|" + s;
        window.AppAPI.executeCommand("speak", finalData);
    } else {
        alert("Ye feature sirf hamari App mein kaam karega!");
    }
}
</script>

</body>
</html>
