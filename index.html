<!DOCTYPE html>
<html>
<head>
    <title>Google Drive Chat Save</title>
    <!-- Google API Client Library load karein -->
    <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
    <h1>AI Chat Saver</h1>
    <button id="auth-btn">Login with Google</button>
    <button id="save-btn" style="display:none;">Save Chat to Drive</button>

    <script>
        const CLIENT_ID = '.703305381743-cdq96p7rogoekgq1cbteu7nk4eh3ihcv.apps.googleusercontent.com'; // Apni Client ID yahan dalein
        const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
        const SCOPES = "https://www.googleapis.com/auth/drive.file";

        let authClient;

        function handleClientLoad() {
            gapi.load('client:auth2', initClient);
        }

        function initClient() {
            gapi.client.init({
                clientId: CLIENT_ID,
                discoveryDocs: DISCOVERY_DOCS,
                scope: SCOPES
            }).then(() => {
                document.getElementById('auth-btn').onclick = () => gapi.auth2.getAuthInstance().signIn();
                document.getElementById('save-btn').onclick = saveChatToDrive;
                
                gapi.auth2.getAuthInstance().isSignedIn.listen(updateSigninStatus);
            });
        }

        function updateSigninStatus(isSignedIn) {
            if (isSignedIn) {
                document.getElementById('save-btn').style.display = 'block';
                document.getElementById('auth-btn').innerText = 'Logged In';
            }
        }

        function saveChatToDrive() {
            const chatContent = "Yeh mera AI chat ka data hai."; // Yahan apna chat variable dalein
            const file = new Blob([chatContent], {type: 'text/plain'});
            const metadata = { 'name': 'chat_history.txt', 'mimeType': 'text/plain' };

            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', file);

            fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: new Headers({ 'Authorization': 'Bearer ' + gapi.auth2.getAuthInstance().currentUser.get().getAuthResponse().access_token }),
                body: form
            }).then(res => alert('Chat Saved Successfully!'));
        }
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="handleClientLoad()"></script>
</body>
</html>
