<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>AI Script Saver - Google Drive</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .btn { padding: 15px 25px; font-size: 18px; cursor: pointer; background: #4285F4; color: white; border: none; border-radius: 5px; }
        #status { margin-top: 20px; color: #555; }
    </style>
</head>
<body>

    <h1>AI Chat Script Saver</h1>
    <p>Apni AI scripts ko seedha apne Google Drive mein save karein.</p>
    
    <button id="auth_btn" class="btn">Connect Google Drive</button>
    <div id="status">Status: Waiting for connection...</div>

    <script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>

    <script>
        let tokenClient;
        let accessToken = null;

        // 1. Client Initialize karein
        function initClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: '703305381743-78p5ruuc9g9bqr6qvc016uunn3r1obbr.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive.file',
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        document.getElementById('status').innerText = "Status: Connected! Saving script...";
                        saveScriptToDrive();
                    }
                },
            });
        }

        // 2. Login Button Function
        document.getElementById('auth_btn').onclick = () => {
            if (accessToken === null) {
                tokenClient.requestAccessToken();
            } else {
                saveScriptToDrive();
            }
        };

        // 3. Drive mein File Save karne ka Function
        function saveScriptToDrive() {
            const fileName = "AI_Chat_Script.txt";
            const content = "Yeh aapki AI ki banayi hui script hai jo Drive mein save ho rahi hai.";

            const metadata = {
                'name': fileName,
                'mimeType': 'text/plain'
            };

            const file = new Blob([content], { type: 'text/plain' });
            const metadataBlob = new Blob([JSON.stringify(metadata)], { type: 'application/json' });

            const formData = new FormData();
            formData.append('metadata', metadataBlob);
            formData.append('file', file);

            fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: new Headers({ 'Authorization': 'Bearer ' + accessToken }),
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.id) {
                    document.getElementById('status').innerHTML = `<b>Success!</b> File saved in your Drive (ID: ${data.id})`;
                } else {
                    document.getElementById('status').innerText = "Error saving file.";
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('status').innerText = "Network Error.";
            });
        }
    </script>
</body>
</html>
