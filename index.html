<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Control Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; }
        .voice-box { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 20px; text-align: center; }
        .control-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        input[type=range] { width: 100%; accent-color: #6200EE; }
        button { width: 100%; padding: 15px; background: #6200EE; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); background: #3700B3; }
        .val { float: right; color: #6200EE; }
    </style>
</head>
<body>

<div class="voice-box">
    <h2>🔊 Voice Settings</h2>
    
    <div class="control-group">
        <label>Awaaz (Male/Female) <span id="pVal" class="val">1.0</span></label>
        <input type="range" id="pitch" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('pVal').innerText=this.value">
    </div>

    <div class="control-group">
        <label>Raftaar (Speed) <span id="sVal" class="val">1.0</span></label>
        <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('sVal').innerText=this.value">
    </div>

    <button onclick="speakText('नमस्ते, मैं आपकी आवाज को कंट्रोल कर रहा हूँ। अब आप मुझे मेल या फीमेल बना सकते हैं।')">
        🔊 TEST VOICE
    </button>
</div>

<script>
function speakText(msg) {
    var p = document.getElementById('pitch').value;
    var s = document.getElementById('speed').value;
    
    // Yahan hum AndroidBridge check kar rahe hain
    if (window.AndroidBridge) {
        window.AndroidBridge.talk(msg, parseFloat(p), parseFloat(s));
    } else {
        alert("Ye feature sirf App ke andar kaam karega!");
    }
}
</script>

</body>
</html>

        <div class="bar" style="animation-delay: 0s"></div>
        <div class="bar" style="animation-delay: 0.1s"></div>
        <div class="bar" style="animation-delay: 0.2s"></div>
        <div class="bar" style="animation-delay: 0.3s"></div>
        <div class="bar" style="animation-delay: 0.4s"></div>
        <div class="bar" style="animation-delay: 0.5s"></div>
    </div>

    <textarea id="textInput" rows="3">नमस्ते प्लेयर! स्क्वाड फायर में आपका स्वागत है।</textarea>

    <div class="control-panel">
        <div class="row">
            <label>स्पीड (Speed): <span id="rVal">0.9</span></label>
            <input type="range" id="rate" min="0.5" max="1.5" value="0.9" step="0.1">
        </div>
        <div class="row">
            <label>पिच (Pitch): <span id="pVal">1.0</span></label>
            <input type="range" id="pitch" min="0.5" max="1.5" value="1.0" step="0.1">
        </div>
    </div>

    <button class="btn-main" onclick="speakNow()">आवाज़ सुनाएं</button>
</div>

<script>
    const synth = window.speechSynthesis;
    const viz = document.getElementById('viz');
    let voices = [];

    // आवाज़ों को लोड करने का सही तरीका
    function loadVoices() {
        voices = synth.getVoices();
    }
    
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    // स्लाइडर अपडेट
    document.getElementById('rate').oninput = (e) => document.getElementById('rVal').innerText = e.target.value;
    document.getElementById('pitch').oninput = (e) => document.getElementById('pVal').innerText = e.target.value;

    function speakNow() {
        if (synth.speaking) { synth.cancel(); } // अगर पहले से बोल रहा है तो रोकें

        const text = document.getElementById('textInput').value;
        if (!text) return;

        const utterance = new SpeechSynthesisUtterance(text);
        
        // हिंदी आवाज़ ढूँढें
        loadVoices(); 
        let hindiVoice = voices.find(v => v.lang.includes('hi-IN') && v.name.includes('Google')) || 
                         voices.find(v => v.lang.includes('hi-IN'));

        if (hindiVoice) {
            utterance.voice = hindiVoice;
        }

        utterance.rate = document.getElementById('rate').value;
        utterance.pitch = document.getElementById('pitch').value;
        utterance.volume = 1;

        // Visualizer Effect
        utterance.onstart = () => viz.classList.add('speaking');
        utterance.onend = () => viz.classList.remove('speaking');
        utterance.onerror = () => viz.classList.remove('speaking');

        synth.speak(utterance);
    }

    // शुरू में आवाज़ें लोड करें
    loadVoices();
</script>

</body>
</html>
