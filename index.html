<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #070b14; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 100px; background: #1f2937; color: white; border: none; padding: 10px; border-radius: 10px; }
        button { background: #e94560; padding: 15px; width: 100%; border: none; border-radius: 10px; color: white; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h3>SQUAD FIRE AI</h3>
    <textarea id="textInput">स्वागत है कमांडो, स्क्वाड फायर तैयार है।</textarea>
    <button onclick="speak()">AI वॉइस एक्टिवेट करें</button>

    <script>
        function speak() {
            var text = document.getElementById('textInput').value;
            var msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'hi-IN'; // हिंदी भाषा
            window.speechSynthesis.cancel(); // पहले वाला ऑडियो रोके
            window.speechSynthesis.speak(msg); // नया बोले
        }
    </script>
</body>
</html>
